<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MST Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f0d;
    --panel:     #131713;
    --border:    #2a3a2a;
    --accent:    #4ade80;
    --accent2:   #86efac;
    --muted:     #4b5563;
    --text:      #d1fae5;
    --text-dim:  #6b7280;
    --gold:      #fbbf24;
    --red:       #f87171;
    --lobby:     #60a5fa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 31px, rgba(74,222,128,.025) 32px),
      repeating-linear-gradient(90deg, transparent, transparent 31px, rgba(74,222,128,.025) 32px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 1;
    border-bottom: 1px solid var(--border);
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    gap: 20px;
  }

  .logo-block h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem;
    color: var(--accent);
    letter-spacing: .1em;
    text-shadow: 0 0 18px rgba(74,222,128,.5);
  }

  .logo-block p {
    font-size: .85rem;
    color: var(--text-dim);
    letter-spacing: .05em;
    margin-top: 2px;
  }

  .header-stats {
    margin-left: auto;
    display: flex;
    gap: 24px;
  }

  .stat {
    text-align: right;
  }

  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.5rem;
    line-height: 1;
  }

  .stat-label {
    font-size: .75rem;
    color: var(--text-dim);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  .stat.online .stat-val  { color: var(--accent); text-shadow: 0 0 10px rgba(74,222,128,.4); }
  .stat.lobby  .stat-val  { color: var(--lobby);  text-shadow: 0 0 10px rgba(96,165,250,.4); }
  .stat.queue  .stat-val  { color: var(--gold);   text-shadow: 0 0 10px rgba(251,191,36,.4); }
  .stat.total  .stat-val  { color: var(--text-dim); }

  main {
    position: relative;
    z-index: 1;
    padding: 32px 40px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .refresh-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 7px 18px;
    cursor: pointer;
    letter-spacing: .1em;
    transition: border-color .15s, background .15s;
  }

  .refresh-btn:hover {
    background: rgba(74,222,128,.07);
    border-color: var(--accent);
  }

  .refresh-btn.spinning .spin-icon { display: inline-block; animation: spin .7s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .last-update {
    font-family: 'Share Tech Mono', monospace;
    font-size: .75rem;
    color: var(--text-dim);
  }

  #filter {
    margin-left: auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    outline: none;
    width: 200px;
    transition: border-color .15s;
  }

  #filter:focus { border-color: var(--accent); }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-align: left;
    padding: 0 16px 10px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid rgba(42,58,42,.5);
    transition: background .12s;
    animation: fadeIn .3s ease both;
  }

  tbody tr:hover { background: rgba(74,222,128,.04); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  td {
    padding: 13px 16px;
    font-size: .95rem;
    vertical-align: middle;
  }

  .td-username {
    font-family: 'Share Tech Mono', monospace;
    font-size: .9rem;
    color: var(--text);
  }

  .td-username.offline { color: var(--muted); }

  .status-pill {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    font-size: .8rem;
    font-weight: 600;
    letter-spacing: .06em;
    padding: 3px 11px;
    border-radius: 2px;
  }

  .status-pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .pill-mst    { background: rgba(74,222,128,.12); color: var(--accent);  }
  .pill-mst    .dot { background: var(--accent);  box-shadow: 0 0 6px var(--accent); animation: pulse 1.8s ease-in-out infinite; }
  .pill-lobby  { background: rgba(96,165,250,.12); color: var(--lobby);   }
  .pill-lobby  .dot { background: var(--lobby); }
  .pill-offline{ background: rgba(107,114,128,.1); color: var(--muted);   }
  .pill-offline .dot { background: var(--muted); }
  .pill-queue  { background: rgba(251,191,36,.1);  color: var(--gold);   }
  .pill-queue  .dot { background: var(--gold); }
  .pill-unknown{ background: rgba(107,114,128,.1); color: var(--muted);   }
  .pill-unknown .dot { background: var(--muted); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .35; }
  }

  .td-duration {
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    color: var(--text-dim);
  }

  .td-duration.active { color: var(--accent2); }

  .td-first {
    font-family: 'Share Tech Mono', monospace;
    font-size: .78rem;
    color: var(--text-dim);
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: .85rem;
    letter-spacing: .08em;
  }

  .empty-state .big { font-size: 2.5rem; margin-bottom: 12px; opacity: .2; }

  .error-bar {
    background: rgba(248,113,113,.1);
    border: 1px solid rgba(248,113,113,.3);
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    padding: 10px 16px;
    margin-bottom: 20px;
    display: none;
  }

  .error-bar.visible { display: block; }

  @media (max-width: 600px) {
    header { padding: 20px; flex-wrap: wrap; }
    main   { padding: 20px; }
    .header-stats { gap: 16px; }
    #filter { width: 100%; }
    .td-first, .td-duration { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <h1>MST TRACKER</h1>
    <p>Mineshaft Tycoon &mdash; Live Player Status</p>
  </div>
  <div class="header-stats">
    <div class="stat online">
      <div class="stat-val" id="cnt-mst">—</div>
      <div class="stat-label">On MST</div>
    </div>
    <div class="stat queue">
      <div class="stat-val" id="cnt-queue">—</div>
      <div class="stat-label">In Queue</div>
    </div>
    <div class="stat lobby">
      <div class="stat-val" id="cnt-lobby">—</div>
      <div class="stat-label">Lobby</div>
    </div>
    <div class="stat total">
      <div class="stat-val" id="cnt-total">—</div>
      <div class="stat-label">Total</div>
    </div>
  </div>
</header>

<main>
  <div class="error-bar" id="error-bar">Could not reach tracker server. Check your API_URL configuration.</div>

  <div class="toolbar">
    <button class="refresh-btn" id="refresh-btn" onclick="fetchData()"><span class="spin-icon">&#x21BB;</span> REFRESH</button>
    <span class="last-update" id="last-update">Fetching...</span>
    <input id="filter" type="text" placeholder="Filter players..." oninput="renderTable()">
  </div>

  <table>
    <thead>
      <tr>
        <th>Player</th>
        <th>Status</th>
        <th>Time in Current Status</th>
        <th>First Seen</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <div class="empty-state" id="empty-state" style="display:none">
    <div class="big">⛏</div>
    No players found.
  </div>
</main>

<script>
  // ─── CONFIGURE THIS ───────────────────────────────────────────────────────────
  const API_URL = "";  // same server, no URL needed
  // ─────────────────────────────────────────────────────────────────────────────

  const REFRESH_INTERVAL_MS = 30000;

  let allPlayers = [];

  function formatDuration(ms) {
    if (ms < 0) ms = 0;
    const s = Math.floor(ms / 1000);
    const m = Math.floor(s / 60);
    const h = Math.floor(m / 60);
    const d = Math.floor(h / 24);
    if (d > 0) return `${d}d ${h % 24}h`;
    if (h > 0) return `${h}h ${m % 60}m`;
    if (m > 0) return `${m}m ${s % 60}s`;
    return `${s}s`;
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
  }

  function statusPill(status) {
    const map = {
      mst:     { cls: "pill-mst",     label: "ON MST"  },
      lobby:   { cls: "pill-lobby",   label: "LOBBY"   },
      queue:   { cls: "pill-queue",   label: "IN QUEUE" },
      offline: { cls: "pill-offline", label: "OFFLINE" },
    };
    const s = map[status] || { cls: "pill-unknown", label: status.toUpperCase() };
    return `<span class="status-pill ${s.cls}"><span class="dot"></span>${s.label}</span>`;
  }

  function renderTable() {
    const query = document.getElementById("filter").value.toLowerCase().trim();
    const tbody = document.getElementById("tbody");
    const empty = document.getElementById("empty-state");

    const filtered = allPlayers.filter(p =>
      !query || p.username.toLowerCase().includes(query)
    );

    if (filtered.length === 0) {
      tbody.innerHTML = "";
      empty.style.display = "block";
      return;
    }

    empty.style.display = "none";
    const now = Date.now();

    tbody.innerHTML = filtered.map((p, i) => {
      const durationMs = now - p.statusSince;
      const durationClass = p.status === "mst" ? "active" : "";
      return `<tr style="animation-delay:${i * 40}ms">
        <td><span class="td-username${p.online ? "" : " offline"}">${escHtml(p.username)}</span></td>
        <td>${statusPill(p.status)}</td>
        <td class="td-duration ${durationClass}">${formatDuration(durationMs)}</td>
        <td class="td-first">${formatDate(p.firstSeen)}</td>
      </tr>`;
    }).join("");

    document.getElementById("cnt-mst").textContent   = allPlayers.filter(p => p.online && p.status === "mst").length;
    document.getElementById("cnt-lobby").textContent = allPlayers.filter(p => p.online && p.status === "lobby").length;
    document.getElementById("cnt-queue").textContent = allPlayers.filter(p => p.online && p.status === "queue").length;
    document.getElementById("cnt-total").textContent = allPlayers.length;
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function fetchData() {
    const btn = document.getElementById("refresh-btn");
    const err = document.getElementById("error-bar");
    btn.classList.add("spinning");

    try {
      const res = await fetch(`${API_URL}/players`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allPlayers = await res.json();
      err.classList.remove("visible");
      document.getElementById("last-update").textContent =
        "Updated " + new Date().toLocaleTimeString();
      renderTable();
    } catch (e) {
      err.classList.add("visible");
      document.getElementById("last-update").textContent = "Failed to update";
    } finally {
      btn.classList.remove("spinning");
    }
  }

  fetchData();
  setInterval(fetchData, REFRESH_INTERVAL_MS);
  setInterval(renderTable, 10000);
</script>
</body>
</html>
